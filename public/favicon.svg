<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>
  <!-- Background circle with gradient -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Inner dark circle -->
  <circle cx="32" cy="32" r="26" fill="#0a0a0a" opacity="0.85"/>
  <!-- Subtle glow ring -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="url(#bg)" stroke-width="1.5" opacity="0.6"/>
  <!-- PK Monogram -->
  <text x="32" y="43" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="28" fill="url(#textGrad)" letter-spacing="-1">PK</text>
</svg>